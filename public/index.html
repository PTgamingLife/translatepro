<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TranslatePro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>TranslatePro Hybrid Interpreter</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="mobile-notice" id="mobileNotice" hidden>
      <strong>iPhone 使用提示</strong>
      <span>麥克風需要 HTTPS。手機請使用 GitHub Pages 或其他 https 網址開啟。</span>
      <button id="dismissNotice" type="button">知道了</button>
    </div>

    <div class="mobile-notice setup-notice" id="setupNotice" hidden>
      <strong>請先設定 Supabase</strong>
      <span>GitHub Pages 不能保存 API key。請輸入 Supabase Project Ref，翻譯會送到 Edge Function。</span>
      <form id="setupForm">
        <input id="projectRefInput" name="projectRef" placeholder="例如 abcdefghijklmnopqrst" autocomplete="off" />
        <button type="submit">儲存</button>
      </form>
    </div>

    <main class="app-shell">
      <section class="pane pane-top" aria-label="上方語言區塊">
        <div class="pane-inner upside-down">
          <div class="pane-bar">
            <label>
              上方語言
              <select id="topLanguage"></select>
            </label>
            <span class="status-dot" id="topStatus">待機</span>
          </div>
          <div class="transcript-grid">
            <article>
              <h2>聽到的內容</h2>
              <p id="topOriginal" class="text-area muted"></p>
            </article>
            <article>
              <h2>翻譯結果</h2>
              <p id="topTranslation" class="text-area"></p>
            </article>
          </div>
        </div>
      </section>

      <section class="control-strip" aria-label="錄音與翻譯控制">
        <div class="brand">TranslatePro</div>
        <button id="topSpeakButton" class="primary">上方說話</button>
        <button id="bottomSpeakButton" class="primary">下方說話</button>
        <button id="stopButton" disabled>結束並修正</button>
        <label class="switch">
          <input id="speakToggle" type="checkbox" checked />
          <span>修正後朗讀</span>
        </label>
        <label>
          語音模板
          <select id="voiceSelect">
            <option value="alloy">alloy - 推薦，中性穩定</option>
            <option value="coral">coral - 友善明亮</option>
            <option value="verse">verse - 自然敘述</option>
            <option value="shimmer">shimmer - 輕快清楚</option>
            <option value="ash">ash - 低沉穩重</option>
          </select>
        </label>
        <button id="swapButton" title="交換上下語言">交換語言</button>
        <button id="exportButton" disabled>匯出文字檔</button>
      </section>

      <section class="pane pane-bottom" aria-label="下方語言區塊">
        <div class="pane-inner">
          <div class="pane-bar">
            <label>
              下方語言
              <select id="bottomLanguage"></select>
            </label>
            <span class="status-dot" id="bottomStatus">待機</span>
          </div>
          <div class="transcript-grid">
            <article>
              <h2>聽到的內容</h2>
              <p id="bottomOriginal" class="text-area muted"></p>
            </article>
            <article>
              <h2>翻譯結果</h2>
              <p id="bottomTranslation" class="text-area"></p>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
